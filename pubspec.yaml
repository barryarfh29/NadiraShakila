name: ai_desktop
description: AI Desktop Assistant - A modern AI coding assistant for desktop
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # HTTP & Streaming
  http: ^1.2.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI & Rendering
  flutter_markdown: ^0.6.18
  google_fonts: ^6.1.0
  highlight: ^0.7.0
  flutter_highlight: ^0.7.0
  flutter_svg: ^2.0.10

  # Utilities
  uuid: ^4.2.2
  intl: ^0.19.0
  path_provider: ^2.1.1
  url_launcher: ^6.2.2
  path: ^1.9.0
  file_picker: ^8.1.2
  window_manager: ^0.4.2

  # Terminal
  xterm: ^4.0.0
  flutter_pty: ^0.4.1

  # Clipboard image paste
  pasteboard: ^0.2.0

  # Image processing (resize/compress before sending to AI)
  image: ^4.2.0

  # Drag & drop files/images into chat
  desktop_drop: ^0.4.4
  http_parser: ^4.1.2
  dio: ^5.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  windows:
    generate: true
    image_path: "assets/logo.png"
    icon_size: 256

flutter:
  uses-material-design: true
  assets:
    - assets/file_icons/
    - assets/logo.png
    - assets/wordmark.png
  fonts:
    - family: codicon
      fonts:
        - asset: assets/fonts/codicon.ttf
    - family: JetBrains Mono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Italic.ttf
          style: italic
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
        - asset: assets/fonts/JetBrainsMono-BoldItalic.ttf
          weight: 700
          style: italic
